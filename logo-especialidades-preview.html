<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Logo Especialidades — Versiones</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial, sans-serif; background: #e8e8e8; padding: 40px; }
h2 { font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 24px; }
.row { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 40px; }
.card {
  border-radius: 16px;
  padding: 36px 32px;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 14px;
  min-width: 280px;
}
.label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  opacity: 0.5;
}
</style>
</head>
<body>

<h2>Opciones de color — elige la que más le favorezca</h2>

<div class="row">

  <!-- A: Azul marino -->
  <div class="card" style="background:white;box-shadow:0 4px 20px rgba(0,0,0,0.08);">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 75" width="280" height="105">
      <g transform="translate(4,4)">
        <path d="M16,9 C16,4 20,1 25,1 C29,1 31,4 34,4 C37,4 39,1 43,1 C48,1 52,4 52,9 L52,28 C52,36 49,46 46,52 C44,56 42,60 39,60 C37,60 36,55 35,48 C34.5,44 34.5,40 34,36 C33.5,40 33.5,44 33,48 C32,55 31,60 29,60 C26,60 24,56 22,52 C19,46 16,36 16,28 Z" fill="#1a3d6e"/>
        <circle cx="27" cy="22" r="3.5" fill="white"/>
        <circle cx="41" cy="22" r="3.5" fill="white"/>
        <circle cx="28" cy="23" r="1.8" fill="#1a3d6e"/>
        <circle cx="42" cy="23" r="1.8" fill="#1a3d6e"/>
        <path d="M26,33 Q34,39 42,33" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
      </g>
      <text x="66" y="24" font-family="Georgia,serif" font-size="13" font-weight="700" fill="#1a3d6e" letter-spacing="0.3">Especialidades</text>
      <text x="66" y="41" font-family="Georgia,serif" font-size="13" font-weight="700" fill="#1a3d6e" letter-spacing="0.3">Odontológicas</text>
      <text x="66" y="55" font-family="Georgia,serif" font-size="10" fill="#888" letter-spacing="0.2">Grupo Dental, S.L.</text>
    </svg>
    <div class="label" style="color:#1a3d6e;">A — Azul marino</div>
  </div>

  <!-- B: Verde esmeralda -->

  <!-- D: Azul cielo + gris -->

    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 75" width="280" height="105">
      <g transform="translate(4,4)">
        <path d="M16,9 C16,4 20,1 25,1 C29,1 31,4 34,4 C37,4 39,1 43,1 C48,1 52,4 52,9 L52,28 C52,36 49,46 46,52 C44,56 42,60 39,60 C37,60 36,55 35,48 C34.5,44 34.5,40 34,36 C33.5,40 33.5,44 33,48 C32,55 31,60 29,60 C26,60 24,56 22,52 C19,46 16,36 16,28 Z" fill="#0ea5c9"/>

</html>
