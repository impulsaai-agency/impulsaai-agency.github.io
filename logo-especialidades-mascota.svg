  <text x="118" y="50" font-family="Georgia, serif" font-size="15" font-weight="700" fill="#28ae46" letter-spacing="0.5">Odontológicas</text>
  <text x="118" y="66" font-family="Georgia, serif" font-size="11" font-weight="400" fill="#555" letter-spacing="0.3">Grupo Dental, S.L.</text>
