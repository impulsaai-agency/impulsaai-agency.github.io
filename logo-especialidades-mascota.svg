    <path d="M17,40 Q50,59 83,40" stroke="#111" stroke-width="3.5" fill="none" stroke-linecap="round"/>

    <!-- DIENTES — 2 rectángulos blancos centrados -->
    <rect x="34" y="40" width="13" height="13" rx="2.5" fill="white"/>
    <rect x="53" y="40" width="13" height="13" rx="2.5" fill="white"/>

  </g>

  <!-- TEXTO -->
