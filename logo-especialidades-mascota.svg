<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 118" width="560" height="236">
  <rect width="280" height="118" fill="white"/>

  <g transform="translate(5,5)">

    <!-- CUERPO: corona 86×60 (ratio 1.43:1), raíces anchas 33px c/u, gap 14px -->
    <path
      d="M8,8 Q0,2 0,12 L0,60
         Q0,70 5,72 L5,92
         Q5,118 22,118 Q38,118 38,92 L38,72
         L50,72 L50,92
         Q50,118 66,118 Q82,118 82,92 L82,72
         Q86,70 86,60 L86,12
         Q86,2 78,8
         Q67,0 57,10 Q43,17 29,10 Q19,0 8,8 Z"
      fill="#44cac5"
      stroke="#1a1a1a"
      stroke-width="7"
      stroke-linejoin="round"
      style="paint-order: stroke fill"/>

    <!-- BRILLO SUPERIOR -->
    <path d="M8,8 Q19,0 29,10 Q43,17 57,10 Q67,0 78,8 Q86,2 86,12 L86,30 Q64,14 43,13 Q22,14 0,30 L0,12 Q0,2 8,8 Z"
      fill="white" opacity="0.18"/>

    <!-- OJO IZQUIERDO (ligeramente más grande) -->
    <circle cx="21" cy="22" r="14" fill="white" stroke="#1a1a1a" stroke-width="2.5"/>
    <circle cx="23" cy="24" r="8" fill="#1a1a1a"/>
    <circle cx="26.5" cy="20" r="3.2" fill="white"/>

    <!-- OJO DERECHO -->
    <circle cx="65" cy="22" r="13" fill="white" stroke="#1a1a1a" stroke-width="2.5"/>
    <circle cx="67" cy="24" r="7.5" fill="#1a1a1a"/>
    <circle cx="70.5" cy="20" r="3" fill="white"/>

    <!-- LÍNEAS DE MEJILLA -->
    <path d="M6,53 Q1,46 7,42" stroke="#1e8c88" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M80,53 Q85,46 79,42" stroke="#1e8c88" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- SONRISA ABIERTA GRANDE (80% del ancho) -->
    <path d="M7,50 Q43,66 79,50 L79,44 Q63,38 43,38 Q23,38 7,44 Z" fill="#1a1a1a"/>

    <!-- 2 DIENTES BLANCOS -->
    <rect x="22" y="38" width="17" height="14" rx="3" fill="white"/>
    <rect x="47" y="38" width="17" height="14" rx="3" fill="white"/>

  </g>

  <!-- TEXTO -->
  <text x="112" y="40" font-family="Georgia, serif" font-size="16" font-weight="700" fill="#44cac5" letter-spacing="0.4">Especialidades</text>
  <text x="112" y="60" font-family="Georgia, serif" font-size="16" font-weight="700" fill="#44cac5" letter-spacing="0.4">Odontológicas</text>
  <text x="112" y="76" font-family="Georgia, serif" font-size="12" font-weight="400" fill="#555" letter-spacing="0.3">Grupo Dental, S.L.</text>
</svg>
